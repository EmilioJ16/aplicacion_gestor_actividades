<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
<head>
<title>User Registration</title>
</head>
    <body>
        <h1>User Registration Form</h1>

        <form action="register" method="POST">
            Name:
            <input type="text" name="name" size="30"><br><br>

            Surname:
            <input type="text" name="surname" size="30"><br><br>

            Address:
            <input type="text" name="address" size="30"><br><br>

            Phone:
            <input type="text" name="phone" size="30"><br><br>

            Login:
            <input type="text" name="login" size="30"><br><br>

            Password:
            <input type="password" name="passwd" size="30"><br><br>

            <input type="submit" value="Send registration data">
            <input type="reset" value="Clear">
        </form>

        <p>
        <a href="index.html">Return to initial page</a>
        </p>

    </body>
</html>
