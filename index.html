<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
<head>
<title>Sporting Activities Application: Universidad Carlos III de Madrid</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #eef3f8, #dfe7f1);
        color: #1f2d3d;
    }

    .container {
        width: 520px;
        margin: 80px auto;
        background: white;
        padding: 40px;
        border-radius: 14px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        text-align: center;
    }

    h1 {
        color: #003366;
        font-size: 30px;
        margin-bottom: 20px;
        line-height: 1.3;
    }

    p {
        font-size: 18px;
        margin-bottom: 30px;
        color: #4a5568;
    }

    form {
        margin: 18px 0;
    }

    input[type="submit"] {
        width: 260px;
        padding: 14px;
        font-size: 16px;
        font-weight: bold;
        border: none;
        border-radius: 8px;
        background-color: #003366;
        color: white;
        cursor: pointer;
        transition: background-color 0.25s ease, transform 0.2s ease;
    }

    input[type="submit"]:hover {
        background-color: #00509e;
        transform: translateY(-2px);
    }

    input[type="submit"]:active {
        transform: translateY(0);
    }

    .footer {
        margin-top: 30px;
        font-size: 13px;
        color: #718096;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Sporting Activities Application</h1>
    <p>Universidad Carlos III de Madrid</p>

    <p>Please select an option:</p>

    <form action="register.jsp" method="get">
        <input type="submit" value="Registration">
    </form>

    <form action="access" method="get">
        <input type="submit" value="Registered user">
    </form>
<!-- 
    <form action="managerLogin.jsp" method="get">
        <input type="submit" value="Manager access">
    </form>
-->
    <div class="footer">
        Web application for sporting activities management
    </div>
</div>

</body>
</html>
